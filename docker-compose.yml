services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-documind}
      POSTGRES_DB: ${POSTGRES_DB:-documind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-documind}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
